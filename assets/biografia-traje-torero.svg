    <!-- Flecos hombro izquierdo -->
    <path d="M4,28 L4,62" stroke="url(#oro)" stroke-width="2"/>
    <path d="M8,30 L8,64" stroke="url(#oro)" stroke-width="1.6"/>
    <path d="M12,31 L12,65" stroke="url(#oro)" stroke-width="2.4"/>
    <path d="M16,32 L16,66" stroke="url(#oro)" stroke-width="1.8"/>
