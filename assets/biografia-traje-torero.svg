    <path d="M186,26 C190,24 192,26 190,28 C188,30 184,28 184,28" stroke="url(#oro)" stroke-width="1"/>
    <circle cx="188" cy="27" r="0.5" fill="#fffbe6" opacity="0.35"/>

    <!-- Hojas -->
    <path d="M184,4 Q190,6 192,10 Q188,8 184,6" stroke="url(#oro)" stroke-width="1"/>
    <path d="M164,6 Q170,8 172,12 Q168,10 164,8" stroke="url(#oro)" stroke-width="1"/>
    <path d="M194,22 Q198,26 196,30 Q192,28 192,24" stroke="url(#oro)" stroke-width="0.8"/>
    <path d="M178,28 Q182,30 186,34 Q182,32 178,30" stroke="url(#oro)" stroke-width="0.8"/>
    <path d="M162,16 Q166,18 168,22 Q164,20 160,18" stroke="url(#oro)" stroke-width="0.8"/>

    <path d="M190,6 C192,4 194,6 192,8 C190,10 188,8 190,6" stroke="url(#oro)" stroke-width="0.6"/>
    <path d="M160,8 C162,6 164,8 162,10 C160,12 158,10 160,8" stroke="url(#oro)" stroke-width="0.6"/>
  </g>

  <!-- ==================== FLECOS / BORLAS ==================== -->
