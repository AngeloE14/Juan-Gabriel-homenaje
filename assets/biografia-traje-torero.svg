    <circle cx="142" cy="10" r="0.7" fill="#fff7bd" opacity="0.5"/>
    <circle cx="194" cy="20" r="0.9" fill="#fae053" opacity="0.5"/>
    <circle cx="150" cy="18" r="0.7" fill="#e0a61b" opacity="0.5"/>
    <circle cx="184" cy="42" r="0.8" fill="#fffbe6" opacity="0.45"/>
