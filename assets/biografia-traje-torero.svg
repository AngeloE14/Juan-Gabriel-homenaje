<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 72" preserveAspectRatio="none">
  <defs>
    <linearGradient id="oro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffbe6"/>
      <stop offset="0.2" stop-color="#fae053"/>
      <stop offset="0.4" stop-color="#c9941a"/>
      <stop offset="0.6" stop-color="#e0a61b"/>
      <stop offset="0.8" stop-color="#d4a017"/>
      <stop offset="1" stop-color="#fff7bd"/>
    </linearGradient>
    <linearGradient id="oroCord" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4ca4f"/>
      <stop offset="0.3" stop-color="#d4a017"/>
      <stop offset="0.7" stop-color="#b87d0a"/>
      <stop offset="1" stop-color="#e0a61b"/>
    </linearGradient>
    <linearGradient id="satLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a18"/>
      <stop offset="0.3" stop-color="#0e0e0c"/>
      <stop offset="0.6" stop-color="#080807"/>
      <stop offset="1" stop-color="#0a0a08"/>
    </linearGradient>
    <linearGradient id="satRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181816"/>
      <stop offset="0.3" stop-color="#0a0a08"/>
      <stop offset="0.6" stop-color="#060605"/>
      <stop offset="1" stop-color="#080807"/>
    </linearGradient>
    <linearGradient id="satChest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040404"/>
      <stop offset="1" stop-color="#010101"/>
    </linearGradient>
    <pattern id="grecas" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0,0 h8 v4 h-5 v5 h7" fill="none" stroke="url(#oro)" stroke-width="1.4" stroke-linecap="square" stroke-linejoin="miter"/>
    </pattern>
    <pattern id="grecas2" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0,0 h8 v4 h-5 v5 h7" fill="none" stroke="#fffbe6" stroke-width="0.4" opacity="0.4" stroke-linecap="square" stroke-linejoin="miter"/>
    </pattern>
    <clipPath id="leftLapel">
      <polygon points="44,16 95,49 100,46 50,10"/>
    </clipPath>
    <clipPath id="rightLapel">
      <polygon points="156,16 105,49 100,46 150,10"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="0.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FONDO NEGRO PROFUNDO -->
  <rect width="200" height="72" fill="#020202"/>

  <!-- CUERPO DE LA CHAQUETA (solapas anchas toreras) -->
  <g>
    <polygon points="0,0 50,10 100,46 100,72 0,72" fill="url(#satLeft)"/>
    <polygon points="200,0 150,10 100,46 100,72 200,72" fill="url(#satRight)"/>
  </g>

  <!-- ABERTURA DEL PECHO (camisa/pecho oscuro debajo) -->
  <polygon points="50,10 150,10 100,46" fill="url(#satChest)"/>

  <!-- ==================== GRECAS ==================== -->
  <!-- Borde de solapa izquierdo -->
  <rect x="40" y="6" width="64" height="48" fill="url(#grecas)" clip-path="url(#leftLapel)" filter="url(#glow)"/>
  <rect x="40" y="6" width="64" height="48" fill="url(#grecas2)" clip-path="url(#leftLapel)"/>
  <!-- Borde de solapa derecho -->
  <rect x="96" y="6" width="64" height="48" fill="url(#grecas)" clip-path="url(#rightLapel)" filter="url(#glow)"/>
  <rect x="96" y="6" width="64" height="48" fill="url(#grecas2)" clip-path="url(#rightLapel)"/>

  <!-- Línea dorada sólida exterior de las grecas -->
  <path d="M50,10 L100,46" stroke="url(#oro)" stroke-width="1.8" fill="none" opacity="0.9"/>
  <path d="M150,10 L100,46" stroke="url(#oro)" stroke-width="1.8" fill="none" opacity="0.9"/>
  <!-- Línea interior de las solapas -->
  <path d="M50,10 L100,46" stroke="#fffbe6" stroke-width="0.3" opacity="0.3" fill="none" transform="translate(-5,-5)"/>
  <path d="M150,10 L100,46" stroke="#fffbe6" stroke-width="0.3" opacity="0.3" fill="none" transform="translate(5,-5)"/>

  <!-- ==================== ALAMARES ==================== -->
  <g fill="none" stroke-linecap="round" filter="url(#glowS)">
    <!-- Cordón 1 -->
    <path d="M82,11 L82,29" stroke="url(#oroCord)" stroke-width="2.2"/>
    <path d="M82,11 L82,29" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
    <!-- Cordón 2 -->
    <path d="M85,11 L85,32" stroke="url(#oroCord)" stroke-width="1.4"/>
    <!-- Cordón 3 -->
    <path d="M88,11 L88,35" stroke="url(#oroCord)" stroke-width="2.5"/>
    <path d="M88,11 L88,35" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
    <!-- Cordón 4 -->
    <path d="M91,11 L91,38" stroke="url(#oroCord)" stroke-width="1.6"/>
    <!-- Cordón 5 -->
    <path d="M94,11 L94,41" stroke="url(#oroCord)" stroke-width="2.8"/>
    <path d="M94,11 L94,41" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
    <!-- Cordón 6 -->
    <path d="M97,11 L97,43" stroke="url(#oroCord)" stroke-width="2"/>
    <!-- Cordón 7 (centro) -->
    <path d="M100,11 L100,45" stroke="url(#oroCord)" stroke-width="3"/>
    <path d="M100,11 L100,45" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
    <!-- Cordón 8 -->
    <path d="M103,11 L103,43" stroke="url(#oroCord)" stroke-width="2"/>
    <!-- Cordón 9 -->
    <path d="M106,11 L106,41" stroke="url(#oroCord)" stroke-width="2.8"/>
    <path d="M106,11 L106,41" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
    <!-- Cordón 10 -->
    <path d="M109,11 L109,38" stroke="url(#oroCord)" stroke-width="1.6"/>
    <!-- Cordón 11 -->
    <path d="M112,11 L112,35" stroke="url(#oroCord)" stroke-width="2.5"/>
    <path d="M112,11 L112,35" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
    <!-- Cordón 12 -->
    <path d="M115,11 L115,32" stroke="url(#oroCord)" stroke-width="1.4"/>
    <!-- Cordón 13 -->
    <path d="M118,11 L118,29" stroke="url(#oroCord)" stroke-width="2.2"/>
    <path d="M118,11 L118,29" stroke="#fffbe6" stroke-width="0.3" opacity="0.3"/>
  </g>

  <!-- ==================== BORDADOS FLORALES (estilo Diego Rivera) ==================== -->
  <!-- HOMBRO IZQUIERDO -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowS)">
    <!-- Tallos principales -->
    <path d="M26,0 Q12,6 6,18 Q2,28 10,36" stroke="url(#oro)" stroke-width="2.8"/>
    <path d="M26,0 Q12,6 6,18 Q2,28 10,36" stroke="#fffbe6" stroke-width="0.4" opacity="0.3"/>
    <path d="M42,0 Q34,4 30,14 Q26,24 32,32" stroke="url(#oro)" stroke-width="2"/>
    <path d="M48,2 Q42,6 40,12" stroke="url(#oro)" stroke-width="1.4"/>

    <!-- Flor grande 1 (5 pétalos) -->
    <path d="M8,16 C4,12 0,14 2,18 C4,22 8,20 10,18 C12,16 14,12 10,10 C6,8 4,12 2,14" stroke="url(#oro)" stroke-width="1.2"/>
    <path d="M8,18 C6,16 4,18 6,20 C8,20 10,18 10,18" fill="url(#oro)" opacity="0.25"/>
    <circle cx="5" cy="17" r="0.8" fill="#fffbe6" opacity="0.4"/>
    <circle cx="8" cy="15" r="0.6" fill="#d4a017" opacity="0.3"/>
    <circle cx="4" cy="19" r="0.5" fill="#e0a61b" opacity="0.25"/>

    <!-- Flor grande 2 (5 pétalos) -->
    <path d="M30,12 C26,8 22,10 24,14 C26,18 30,16 32,14 C34,12 36,8 32,6 C28,4 26,8 24,10" stroke="url(#oro)" stroke-width="1.2"/>
    <path d="M30,14 C28,12 26,14 28,16 C30,16 32,14 32,14" fill="url(#oro)" opacity="0.25"/>
    <circle cx="27" cy="13" r="0.7" fill="#fffbe6" opacity="0.4"/>
    <circle cx="31" cy="11" r="0.5" fill="#d4a017" opacity="0.3"/>

    <!-- Flor pequeña -->
    <path d="M14,26 C10,24 8,26 10,28 C12,30 16,28 16,28" stroke="url(#oro)" stroke-width="1"/>
    <circle cx="12" cy="27" r="0.5" fill="#fffbe6" opacity="0.35"/>

    <!-- Hojas/ramas -->
    <path d="M16,4 Q10,6 8,10 Q12,8 16,6" stroke="url(#oro)" stroke-width="1"/>
    <path d="M36,6 Q30,8 28,12 Q32,10 36,8" stroke="url(#oro)" stroke-width="1"/>
    <path d="M6,22 Q2,26 4,30 Q8,28 8,24" stroke="url(#oro)" stroke-width="0.8"/>
    <path d="M22,28 Q18,30 14,34 Q18,32 22,30" stroke="url(#oro)" stroke-width="0.8"/>
    <path d="M38,16 Q34,18 32,22 Q36,20 40,18" stroke="url(#oro)" stroke-width="0.8"/>

    <!-- Zarcillos (tendrils) -->
    <path d="M10,6 C8,4 6,6 8,8 C10,10 12,8 10,6" stroke="url(#oro)" stroke-width="0.6"/>
    <path d="M40,8 C38,6 36,8 38,10 C40,12 42,10 40,8" stroke="url(#oro)" stroke-width="0.6"/>
  </g>

  <!-- HOMBRO DERECHO -->
