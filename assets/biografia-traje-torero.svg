    <circle cx="24" cy="8" r="0.9" fill="#353532" opacity="0.35"/>
    <circle cx="48" cy="14" r="0.7" fill="#2a2a28" opacity="0.35"/>
    <circle cx="14" cy="50" r="0.8" fill="#353532" opacity="0.35"/>
