    <path d="M156,31 L156,65" stroke="url(#oro)" stroke-width="1.6"/>
    <path d="M160,32 L160,66" stroke="url(#oro)" stroke-width="2.2"/>
    <path d="M164,33 L164,67" stroke="url(#oro)" stroke-width="1.8"/>
    <path d="M168,34 L168,68" stroke="url(#oro)" stroke-width="2.4"/>
    <path d="M172,34 L172,68" stroke="url(#oro)" stroke-width="1.6"/>
    <path d="M176,34 L176,68" stroke="url(#oro)" stroke-width="2.2"/>
    <path d="M180,33 L180,67" stroke="url(#oro)" stroke-width="1.8"/>
    <path d="M184,32 L184,66" stroke="url(#oro)" stroke-width="2.4"/>
    <path d="M188,31 L188,65" stroke="url(#oro)" stroke-width="1.6"/>
    <path d="M192,30 L192,64" stroke="url(#oro)" stroke-width="2"/>
    <path d="M196,28 L196,62" stroke="url(#oro)" stroke-width="2.4"/>
  </g>

  <!-- Reflejos plateados en flecos -->
  <g fill="none" stroke="#fffbe6" stroke-width="0.3" stroke-linecap="round" opacity="0.3">
    <path d="M12,31 L12,55"/>
    <path d="M28,34 L28,58"/>
    <path d="M44,31 L44,55"/>
    <path d="M156,31 L156,55"/>
    <path d="M172,34 L172,58"/>
    <path d="M188,31 L188,55"/>
  </g>

  <!-- ==================== LENTEJUELAS DORADAS ==================== -->
  <g filter="url(#glow)">
    <circle cx="12" cy="6" r="1" fill="#fffbe6" opacity="0.6"/>
    <circle cx="42" cy="4" r="0.8" fill="#f4ca4f" opacity="0.45"/>
    <circle cx="58" cy="10" r="0.7" fill="#fff7bd" opacity="0.5"/>
    <circle cx="6" cy="20" r="0.9" fill="#fae053" opacity="0.5"/>
