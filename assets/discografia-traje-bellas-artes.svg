<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 72" preserveAspectRatio="none">
  <defs>
    <linearGradient id="tieBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#006b30"/>
      <stop offset="0.3" stop-color="#00a64d"/>
      <stop offset="0.5" stop-color="#00cc5e"/>
      <stop offset="0.7" stop-color="#00a64d"/>
      <stop offset="1" stop-color="#006b30"/>
    </linearGradient>
    <linearGradient id="tieVertical" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00cc5e"/>
      <stop offset="0.3" stop-color="#00a64d"/>
      <stop offset="0.6" stop-color="#00803a"/>
      <stop offset="1" stop-color="#004d25"/>
    </linearGradient>
    <linearGradient id="tieKnot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00e06b"/>
      <stop offset="0.5" stop-color="#00a64d"/>
      <stop offset="1" stop-color="#007a3a"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3333"/>
      <stop offset="0.5" stop-color="#dd1111"/>
      <stop offset="1" stop-color="#aa0000"/>
    </linearGradient>
    <linearGradient id="sweepLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(255,255,255,0)"/>
      <stop offset="0.3" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="0.7" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- WHITE SHIRT COLLAR V -->
  <polygon points="0,0 96,0 90,4 84,6 78,8 68,10 0,7" fill="#f0f0f0"/>
  <polygon points="200,0 104,0 110,4 116,6 122,8 132,10 200,7" fill="#f0f0f0"/>

  <!-- LEFT RED ACCENT -->
  <polygon points="0,7 68,10 62,13 54,15 0,11" fill="url(#redAccent)" opacity="0.95"/>

  <!-- RIGHT RED ACCENT -->
  <polygon points="200,7 132,10 138,13 146,15 200,11" fill="url(#redAccent)" opacity="0.95"/>

  <!-- GREEN TIE KNOT -->
  <polygon points="92,7 108,7 110,14 90,14" fill="url(#tieKnot)"/>

  <!-- GREEN TIE BODY (short) -->
  <path d="M94,14 L96,14 L96,22 C96,23 97,24 100,24 C103,24 104,23 104,22 L104,14 L106,14 Z" fill="url(#tieVertical)" filter="url(#shadowLight)"/>

  <!-- Tie highlight -->
  <path d="M98,14 L99,22 C99,23 100,24 100,24" fill="none" stroke="#66ffa0" stroke-width="0.8" opacity="0.15"/>

  <!-- Satin light sweep -->
  <rect x="0" y="0" width="200" height="72" fill="url(#sweepLight)" opacity="0.5" class="discografia-sweep"/>
</svg>
